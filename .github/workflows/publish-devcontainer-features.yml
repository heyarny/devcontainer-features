name: Publish devcontainer features

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish features
        env:
          GHCR_NAMESPACE: ${{ vars.GHCR_NAMESPACE || 'heyarny/devcontainer-features' }}
        run: |
          npx -y @devcontainers/cli features publish devcontainer-features/src \
            --registry ghcr.io \
            --namespace "${GHCR_NAMESPACE}"
